<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Money Organizer</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#3D7FE0" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

const CURRENCY = "BD";

const INITIAL_TRANSACTIONS = [
  { id: 1, type: "in", amount: 5, note: "Eid money", date: "Jul 2" },
  { id: 2, type: "out", amount: 1, note: "Candy 🍬", date: "Jul 4" },
];

const INITIAL_GOALS = [
  { id: 1, name: "New headphones", emoji: "🎧", target: 15 },
  { id: 2, name: "Lego set", emoji: "🧱", target: 25 },
];

const ENCOURAGEMENTS = [
  "Keep it up! 🚀",
  "You're a saving star! ⭐",
  "Look at that stack grow! 💰",
  "Great job tracking! 🎉",
  "You're on fire! 🔥",
];

const EARN_CHIPS = ["Allowance", "Chores", "Gift", "Eid money"];
const SPEND_CHIPS = ["Candy 🍬", "Toy 🧸", "Game 🎮", "Snack 🍟"];
const QUICK_AMOUNTS = [0.5, 1, 2, 5];
const GOAL_EMOJIS = ["🎧", "🧱", "🚲", "🎮", "⚽", "📱", "🎨", "🐶"];

const TITLE_COLORS = [
  "text-sky-500","text-green-500","text-amber-500","text-pink-500",
  "text-violet-500","text-red-500","text-teal-500","text-orange-500",
  "text-blue-500","text-fuchsia-500","text-lime-600","text-rose-500",
];

function uid() { return Math.random().toString(36).slice(2, 9); }

function BubbleTitle({ text }) {
  return (
    <h1 className="text-3xl font-black tracking-tight flex flex-wrap justify-center gap-x-0.5">
      {text.split("").map((ch, i) =>
        ch === " " ? <span key={i}>&nbsp;</span> : (
          <span key={i} className={TITLE_COLORS[i % TITLE_COLORS.length]}
            style={{ textShadow: "1.5px 1.5px 0 rgba(0,0,0,0.12), -1px -1px 0 rgba(255,255,255,0.6)" }}>
            {ch}
          </span>
        )
      )}
    </h1>
  );
}

function App() {
  const [transactions, setTransactions] = useState(INITIAL_TRANSACTIONS);
  const [goals, setGoals] = useState(INITIAL_GOALS);
  const [formMode, setFormMode] = useState(null);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [goalTarget, setGoalTarget] = useState("");
  const [goalEmoji, setGoalEmoji] = useState("🎧");

  const balance = transactions.reduce((sum, t) => sum + (t.type === "in" ? t.amount : -t.amount), 0);
  const totalEarned = transactions.filter(t => t.type === "in").reduce((s, t) => s + t.amount, 0);
  const totalSpent = transactions.filter(t => t.type === "out").reduce((s, t) => s + t.amount, 0);
  const encouragement = ENCOURAGEMENTS[Math.floor(Math.abs(balance) * 3) % ENCOURAGEMENTS.length];

  function closeForm() {
    setFormMode(null); setAmount(""); setNote(""); setGoalTarget(""); setGoalEmoji("🎧");
  }

  function handleSave() {
    if (formMode === "goal") {
      const val = parseFloat(goalTarget);
      if (!val || val <= 0 || !note.trim()) return;
      setGoals([...goals, { id: uid(), name: note.trim(), target: val, emoji: goalEmoji }]);
      closeForm();
      return;
    }
    const val = parseFloat(amount);
    if (!val || val <= 0) return;
    setTransactions([{
      id: uid(), type: formMode, amount: val,
      note: note.trim() || (formMode === "in" ? "Money in" : "Spent"),
      date: new Date().toLocaleDateString(undefined, { month: "short", day: "numeric" }),
    }, ...transactions]);
    closeForm();
  }

  function deleteGoal(id) { setGoals(goals.filter(g => g.id !== id)); }

  return (
    <div className="min-h-screen bg-gradient-to-b from-orange-100 via-amber-50 to-sky-100 flex justify-center py-8 px-4 relative overflow-hidden">
      <div className="pointer-events-none select-none">
        <span className="absolute text-4xl top-10 left-4 opacity-30 rotate-[-12deg]">⭐</span>
        <span className="absolute text-3xl top-24 right-6 opacity-30 rotate-[10deg]">🍭</span>
        <span className="absolute text-3xl top-1/3 left-2 opacity-20 rotate-[8deg]">🪙</span>
        <span className="absolute text-4xl bottom-24 right-3 opacity-20 rotate-[-8deg]">🎈</span>
        <span className="absolute text-3xl bottom-10 left-6 opacity-25 rotate-[6deg]">✨</span>
        <span className="absolute text-3xl top-1/2 right-2 opacity-20 rotate-[-6deg]">🍬</span>
      </div>

      <div className="w-full max-w-sm relative z-10">
        <div className="flex flex-col items-center mb-5">
          <div className="w-20 h-20 rounded-full bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center text-4xl shadow-lg border-4 border-white mb-2 rotate-[-3deg]">🐙</div>
          <BubbleTitle text="Money Organizer" />
        </div>

        <div className="rounded-3xl bg-gradient-to-br from-sky-400 to-blue-600 text-white p-6 mb-4 shadow-lg border-4 border-white relative overflow-hidden">
          <div className="absolute -right-3 -top-3 text-6xl opacity-25 rotate-12">💵</div>
          <div className="absolute right-16 bottom-2 text-3xl opacity-20">🍭</div>
          <p className="text-sm font-bold uppercase tracking-widest text-sky-100 mb-1">You have</p>
          <p className="text-5xl font-black tabular-nums drop-shadow-sm">{CURRENCY} {balance.toFixed(2)}</p>
          <p className="text-sm font-semibold text-sky-50 mt-2 flex items-center gap-1">✨ {encouragement}</p>
          <div className="flex gap-4 mt-3 pt-3 border-t border-white/25 text-xs font-bold">
            <span className="flex items-center gap-1 text-green-100">⬆ Earned {totalEarned.toFixed(2)}</span>
            <span className="flex items-center gap-1 text-red-100">⬇ Spent {totalSpent.toFixed(2)}</span>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-3 mb-6">
          <button onClick={() => setFormMode("in")}
            className="rounded-3xl bg-gradient-to-b from-green-400 to-green-600 text-white py-5 flex flex-col items-center gap-1 font-black text-lg shadow-md border-4 border-white active:scale-95 active:translate-y-0.5 transition-all">
            <span className="text-2xl leading-none">＋</span>MAKE<span className="text-sm font-bold -mt-1">MONEY</span>
          </button>
          <button onClick={() => setFormMode("out")}
            className="rounded-3xl bg-gradient-to-b from-red-400 to-red-600 text-white py-5 flex flex-col items-center gap-1 font-black text-lg shadow-md border-4 border-white active:scale-95 active:translate-y-0.5 transition-all">
            <span className="text-2xl leading-none">－</span>SPEND<span className="text-sm font-bold -mt-1">MONEY</span>
          </button>
        </div>

        <div className="rounded-3xl bg-white p-4 mb-6 shadow-md border-4 border-amber-200">
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-black text-slate-800 flex items-center gap-1.5 text-lg">🏆 My Goals</h2>
            <button onClick={() => setFormMode("goal")}
              className="text-xs font-bold text-white bg-amber-500 px-3 py-1.5 rounded-full shadow-sm active:scale-95 transition-transform">+ New goal</button>
          </div>
          {goals.length === 0 && <p className="text-sm text-slate-400">No goals yet. Add one!</p>}
          <div className="space-y-4">
            {goals.map((g) => {
              const progress = Math.max(0, Math.min(100, (balance / g.target) * 100));
              const reached = balance >= g.target;
              return (
                <div key={g.id} className="flex items-center gap-3">
                  <div className={"w-11 h-11 shrink-0 rounded-2xl flex items-center justify-center text-xl border-2 " + (reached ? "bg-amber-100 border-amber-300" : "bg-sky-50 border-sky-200")}>
                    {g.emoji || "🎯"}
                  </div>
                  <div className="flex-1">
                    <div className="flex justify-between items-baseline mb-1">
                      <span className="text-sm font-bold text-slate-800 flex items-center gap-1">{g.name}{reached && " 🎉"}</span>
                      <span className="text-xs font-semibold text-slate-400 flex items-center gap-2">
                        {Math.max(0, balance).toFixed(2)} / {g.target.toFixed(2)} {CURRENCY}
                        <span className="cursor-pointer hover:text-red-500" onClick={() => deleteGoal(g.id)}>✕</span>
                      </span>
                    </div>
                    <div className="h-3.5 rounded-full bg-amber-100 overflow-hidden border-2 border-white shadow-inner">
                      <div className={"h-full rounded-full transition-all " + (reached ? "bg-gradient-to-r from-amber-400 to-yellow-400" : "bg-gradient-to-r from-green-400 to-green-600")}
                        style={{ width: progress + "%" }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="rounded-3xl bg-white p-4 shadow-md border-4 border-sky-200">
          <h2 className="font-black text-slate-800 mb-3 text-lg">History</h2>
          <div className="space-y-1.5 max-h-64 overflow-y-auto">
            {transactions.length === 0 && <p className="text-sm text-slate-400">No transactions yet.</p>}
            {transactions.map((t) => (
              <div key={t.id} className="flex items-center gap-3 py-2 px-2 rounded-xl even:bg-sky-50">
                <div className={"w-8 h-8 shrink-0 rounded-full flex items-center justify-center text-sm font-black text-white " + (t.type === "in" ? "bg-green-500" : "bg-red-500")}>
                  {t.type === "in" ? "+" : "-"}
                </div>
                <div className="flex-1">
                  <p className="text-sm font-bold text-slate-800">{t.note}</p>
                  <p className="text-xs text-slate-400">{t.date}</p>
                </div>
                <span className={"text-sm font-black tabular-nums " + (t.type === "in" ? "text-green-600" : "text-red-500")}>
                  {t.type === "in" ? "+" : "-"}{t.amount.toFixed(2)} {CURRENCY}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {formMode && (
        <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-50" onClick={closeForm}>
          <div onClick={(e) => e.stopPropagation()} className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-sm p-6 space-y-4 border-4 border-amber-200 max-h-[85vh] overflow-y-auto">
            <div className="flex items-center justify-between">
              <h3 className="font-black text-xl text-slate-800">
                {formMode === "in" && "Add money! 💰"}
                {formMode === "out" && "What'd you buy? 🛍️"}
                {formMode === "goal" && "New goal! 🎯"}
              </h3>
              <button onClick={closeForm} className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">✕</button>
            </div>

            {formMode === "goal" ? (
              <>
                <div className="flex flex-wrap gap-2">
                  {GOAL_EMOJIS.map((e) => (
                    <button key={e} onClick={() => setGoalEmoji(e)}
                      className={"w-10 h-10 rounded-xl flex items-center justify-center text-xl border-2 transition-all " + (goalEmoji === e ? "border-amber-500 bg-amber-100 scale-110" : "border-slate-200")}>
                      {e}
                    </button>
                  ))}
                </div>
                <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Goal name (e.g. New bike)"
                  className="w-full rounded-2xl border-2 border-slate-200 px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500" />
                <input type="number" step="0.01" inputMode="decimal" value={goalTarget} onChange={(e) => setGoalTarget(e.target.value)}
                  placeholder={"Target amount (" + CURRENCY + ")"}
                  className="w-full rounded-2xl border-2 border-slate-200 px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500" />
              </>
            ) : (
              <>
                <input autoFocus type="number" step="0.01" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)}
                  placeholder={"Amount (" + CURRENCY + ")"}
                  className="w-full rounded-2xl border-2 border-slate-200 px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500" />
                <div className="flex flex-wrap gap-2">
                  {QUICK_AMOUNTS.map((a) => (
                    <button key={a} onClick={() => setAmount(String(a))}
                      className="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 active:scale-95 transition-transform">
                      {a} {CURRENCY}
                    </button>
                  ))}
                </div>
                <input value={note} onChange={(e) => setNote(e.target.value)}
                  placeholder={formMode === "in" ? "What's it from?" : "What was it for?"}
                  className="w-full rounded-2xl border-2 border-slate-200 px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500" />
                <div className="flex flex-wrap gap-2">
                  {(formMode === "in" ? EARN_CHIPS : SPEND_CHIPS).map((c) => (
                    <button key={c} onClick={() => setNote(c)}
                      className={"px-3 py-1.5 rounded-full text-xs font-bold active:scale-95 transition-transform " + (formMode === "in" ? "bg-green-100 text-green-700" : "bg-red-100 text-red-600")}>
                      {c}
                    </button>
                  ))}
                </div>
              </>
            )}

            <button onClick={handleSave}
              className={"w-full rounded-2xl text-white font-black py-3.5 text-lg shadow-md active:scale-95 transition-transform " +
                (formMode === "out" ? "bg-gradient-to-b from-red-400 to-red-600" : formMode === "goal" ? "bg-gradient-to-b from-amber-400 to-amber-500" : "bg-gradient-to-b from-green-400 to-green-600")}>
              Save it! ✅
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
